<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DATA MINER ENGINE</title>
<style>
body{background:black;color:#00ff00;font-family:monospace;margin:0;text-align:center;}
.tabs{display:flex;border-bottom:2px solid #003300;}
.tab{flex:1;padding:10px;cursor:pointer;}
.tab:hover{background:#002200;}
.active{background:#003300;}
.box{display:none;}
.box.active{display:block;}
.header{padding:6px;border-bottom:1px solid #003300;}
.panel{padding:8px;border-bottom:1px solid #003300;}
.console{height:40vh;overflow:auto;text-align:left;padding:10px;border:2px solid #00ff00;margin:10px;}
.serverBtn{width:100%;background:black;color:#00ff00;border:1px solid #003300;padding:6px;margin-bottom:4px;cursor:pointer;}
.serverBtn:hover{background:#002200;}
button{background:black;color:#00ff00;border:1px solid #00ff00;padding:6px;margin:3px;cursor:pointer;}
button:hover{background:#003300;}
.error{color:#ff3333;font-weight:bold;}
.dim{opacity:0.35;pointer-events:none;}
.highlight{background:#003300;box-shadow:0 0 10px #00ff00;}
.bar{width:100%;border:1px solid #00ff00;height:20px;margin-top:8px;position:relative;}
.fill{height:100%;width:0%;background:#00ff00;display:flex;align-items:center;justify-content:center;color:black;font-weight:bold;}
.save-panel{margin-top:10px;padding:5px;border-top:1px solid #003300;}
.notification{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:black;border:3px solid #00ff00;color:#00ff00;padding:30px;font-size:24px;font-weight:bold;text-align:center;z-index:1000;box-shadow:0 0 20px #00ff00;animation:fadeInOut 2s ease-in-out;}
@keyframes fadeInOut{0%{opacity:0;transform:translate(-50%,-50%) scale(0.8);}50%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-50%) scale(0.8);}}
</style>
</head>
<body>

<div class="header">DATA MINER ENGINE • Created by Ariel Doreto</div>
<div class="tabs">
<div class="tab active" onclick="openTab(event,'farm')">DATA FARM</div>
<div class="tab" onclick="openTab(event,'server')">SERVER HACK</div>
<div class="tab" onclick="openTab(event,'ops')">DARK OPS</div>
</div>

<!-- DATA FARM -->
<div id="farm" class="box active">
<div class="panel">
<button onclick="mineData()">Mine DATA</button>
<button id="minerBtn" onclick="upgradeMiner()">Upgrade Miner (<span id="minerCost">100</span>)</button>
<button id="autoBtn" onclick="buyAutoMiner()">Auto Miner (<span id="autoCost">500</span>)</button>
<br><br>
<button id="connUpgradeBtn" onclick="upgradeConnection()">Upgrade Connection (<span id="connCost">200</span>)</button>
<button id="connectBtn" onclick="connectServer()">Establish Connection</button>
<button id="autoReconnectBtn" onclick="buyAutoReconnect()">Auto Reconnect ($50000)</button>
<button id="firewallBtn" onclick="upgradeFirewall()">Firewall Lv <span id="firewallLv">0</span> ($<span id="firewallCost">5000</span>)</button>
<br><br>
Connection Lv <span id="connLv">1%</span> | Network Signal <span id="signal">░░░░░░░░░░ 1%</span>
</div>
<div id="consoleFarm" class="console"></div>
</div>

<!-- SERVER HACK -->
<div id="server" class="box">
<div class="panel">
<button onclick="upgradeDownload()">Upgrade Download ($<span id="downCost">50</span>)</button>
<button onclick="upgradeSoftware()">Upgrade Software ($<span id="softCost">80</span>)</button>
</div>
<div id="servers"></div>
<div id="hackBar" class="bar" style="display:none"><div id="hackFill" class="fill">HACKING SERV</div></div>
<div id="consoleHack" class="console"></div>
</div>

<!-- DARK OPS -->
<div id="ops" class="box">
<div class="panel">
<button id="buyHackerBtn" onclick="buyHacker()">Buy Hacker ($<span id="hackerCost">200</span>)</button>
<button id="botNetBtn" onclick="upgradeBotSpeed()">Upgrade Botnet ($<span id="botCost">150</span>)</button>
<button onclick="prestigeNetwork()">PRESTIGE NETWORK ($1000000)</button>
</div>
<div id="consoleOps" class="console"></div>
</div>

<br>
DATA <span id="dataVal">0</span> | Speed <span id="speedVal">1.00 Kpps</span> | USD $<span id="usdVal">0</span> | Hackers <span id="hackersVal">0</span>
<br>
PING <span id="ping">---</span> ms | LATENCY <span id="latency">OFFLINE</span>

<div class="save-panel">
    <button onclick="saveGame()">SAVE GAME</button>
    <button onclick="loadGame()">LOAD SAVE</button>
</div>

<script>
let data=0, usd=0, speed=1000;
let minerLevel=1, minerCost=100;
let autoMiner=0, autoCost=500;
let connected=false;
let connectionLevel=1, maxConnectionLevel=99, connCost=200;
let firewallLevel=0, firewallCost=5000;
let autoReconnect=false;
let hackers=0, hackerCost=200;
let botSpeed=1, botCost=150;
let download=1, software=1, downCost=50, softCost=80;
let hacking=false;
let prestigeBonus=1;

function showNotification(message){
    let notification = document.createElement("div");
    notification.className = "notification";
    notification.innerText = message;
    document.body.appendChild(notification);
    setTimeout(() => notification.remove(), 2000);
}

function updateButtons(){
    let buttons=document.querySelectorAll("button");
    buttons.forEach(b=>{
        if(!connected){
            if(b.id==="connectBtn"){b.classList.remove("dim");b.classList.add("highlight");}
            else if(b.getAttribute("onclick") === "saveGame()" || b.getAttribute("onclick") === "loadGame()"){b.classList.remove("dim");}
            else{b.classList.add("dim");}
        }else{
            b.classList.remove("dim");b.classList.remove("highlight");
            if((b.id==="minerBtn" && data>=minerCost) ||
               (b.id==="autoBtn" && data>=autoCost) ||
               (b.id==="connUpgradeBtn" && data>=connCost) ||
               (b.id==="firewallBtn" && usd>=firewallCost) ||
               (b.id==="buyHackerBtn" && usd>=hackerCost) ||
               (b.id==="botNetBtn" && usd>=botCost)){
                   b.classList.add("highlight");
            }
        }
    });
}

function openTab(e,id){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    e.target.classList.add("active");
    document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function mineData(){
    if(!connected){log("consoleFarm","NETWORK OFFLINE"); return;}
    data+=speed*prestigeBonus;
    usd+=speed*0.00001*prestigeBonus;
    log("consoleFarm",codeLine());
    update();
    updateButtons();
}

function upgradeMiner(){
    if(data>=minerCost){data-=minerCost;minerLevel++;speed+=500;minerCost=Math.floor(minerCost*1.8);
        document.getElementById("minerCost").innerText=formatNumber(minerCost);update();updateButtons();}
}

function buyAutoMiner(){
    if(data>=autoCost){data-=autoCost;autoMiner++;autoCost=Math.floor(autoCost*3);
        document.getElementById("autoCost").innerText=formatNumber(autoCost);updateButtons();}
}

setInterval(()=>{
    if(autoMiner>0 && connected){
        let mined=autoMiner*speed*0.4*prestigeBonus;
        data+=mined;usd+=mined*0.00001*prestigeBonus;
        log("consoleFarm",codeLine());update();updateButtons();
    }
},1200);

function connectServer(){
    if(connected) return; connected=true; log("consoleFarm","NETWORK CONNECTED"); updateSignal(); updateButtons();
}

function upgradeConnection(){
    if(connectionLevel>=maxConnectionLevel) return;
    if(data>=connCost){data-=connCost;connectionLevel++; connCost=Math.floor(connCost*1.6);
        document.getElementById("connCost").innerText=formatNumber(connCost); updateSignal(); update(); updateButtons();}
}

function updateSignal(){
    let percent=1+connectionLevel*0.01; if(percent>99) percent=99;
    let bars=Math.floor(percent/10); let signal=""; for(let i=0;i<10;i++){signal+=i<bars?"█":"░";}
    document.getElementById("signal").innerText="Network Signal "+signal+" "+percent.toFixed(2)+"%";
    document.getElementById("connLv").innerText=percent.toFixed(2)+"%";
}

function buyAutoReconnect(){if(usd>=50000){usd-=50000;autoReconnect=true; log("consoleFarm","AUTO RECONNECT ENABLED"); update(); updateButtons();}}

function upgradeFirewall(){if(usd>=firewallCost){usd-=firewallCost;firewallLevel++;firewallCost=Math.floor(firewallCost*2);
document.getElementById("firewallLv").innerText=firewallLevel;document.getElementById("firewallCost").innerText=formatNumber(firewallCost); updateButtons();}}

setInterval(()=>{
    if(!connected) return;
    let signalPercent=connectionLevel*0.01+1;
    if(signalPercent>99) signalPercent=99;
    let dropChance=100-signalPercent-firewallLevel*2;
    if(dropChance<1) dropChance=1;
    if(Math.random()*100<dropChance){
        connected=false; log("consoleFarm","CONNECTION LOST"); updateButtons();
        if(autoReconnect){setTimeout(()=>{connected=true; log("consoleFarm","AUTO RECONNECTED"); updateSignal(); updateButtons();},2000);}
    }
},5000);

function hackServer(name,diff){
    if(!connected){log("consoleHack","NETWORK OFFLINE"); return;}
    if(hacking) return;
    hacking=true;
    let bar=document.getElementById("hackBar"); let fill=document.getElementById("hackFill");
    bar.style.display="block"; fill.style.width="0%"; fill.innerText="HACKING SERV";
    let progress=0; let speedHack=3+download;
    let timer=setInterval(()=>{
        progress+=speedHack;
        fill.style.width=progress+"%";
        if(progress>=100){
            clearInterval(timer); bar.style.display="none";
            let chance=diff-(software*5);
            if(Math.random()*100>chance){let reward=Math.floor(diff/3*prestigeBonus); usd+=reward; log("consoleHack","ACCESS "+name+" +$"+reward);}
            else{let loss=Math.floor(diff/4); usd-=loss; log("consoleHack","TRACE DETECTED -$"+loss);}
            update(); hacking=false; updateButtons();
        }
    },120);
}

function loadServers(){
    let list=["USA","BRAZIL","GERMANY","UK","FRANCE","CANADA","JAPAN","CHINA"];
    let div=document.getElementById("servers");
    list.forEach(s=>{
        let btn=document.createElement("button"); btn.className="serverBtn"; btn.innerText="Hack "+s;
        btn.onclick=function(){hackServer(s,60);}; div.appendChild(btn);
    });
}

function buyHacker(){if(usd>=hackerCost){usd-=hackerCost;hackers++; update(); updateButtons();}}
function upgradeBotSpeed(){if(usd>=botCost){usd-=botCost;botSpeed++; update(); updateButtons();}}
function prestigeNetwork(){if(usd>=1000000){usd-=1000000;data=0;speed=1000;minerLevel=1;autoMiner=0;connectionLevel=1;firewallLevel=0;hackers=0;botSpeed=1;download=1;software=1;prestigeBonus*=1.5; update(); updateButtons(); log("consoleOps","NETWORK PRESTIGED! Bonus x"+prestigeBonus.toFixed(2));}}

function upgradeDownload(){if(usd>=downCost){usd-=downCost;download++;downCost=Math.floor(downCost*2.5);document.getElementById("downCost").innerText=formatNumber(downCost);update();updateButtons();}}
function upgradeSoftware(){if(usd>=softCost){usd-=softCost;software++;softCost=Math.floor(softCost*2.5);document.getElementById("softCost").innerText=formatNumber(softCost);update();updateButtons();}}

function log(id,text){
    let box=document.getElementById(id); let line=document.createElement("div");
    if(Math.random()<0.18){let err=document.createElement("span"); err.className="error";
    let types=["ERROR","FAILED","ACCESS DENIED","TIMEOUT"]; err.textContent=types[Math.floor(Math.random()*types.length)]+" -> "; line.appendChild(err);}
    line.innerHTML+=text; box.appendChild(line); box.scrollTop=box.scrollHeight;
}

function codeLine(){
    let codes=[
        "#include <iostream>\nusing namespace std;\nint main(){ cout<<\"Mining Data\"<<endl; return 0; }",
        "import socket\ns=socket.socket()\ns.connect(('192.168.1.1',22))",
        "for(i=0;i<100;i++){send_packet(i);}",
        "void exploit(){cout<<\"Exploit sent\";}",
        "class Miner{public:void run(){compute();}}",
        "def hack_server():\n\tprint('Attack')"
    ];
    return codes[Math.floor(Math.random()*codes.length)];
}

function formatNumber(n){if(n>=1e15)return (n/1e15).toFixed(2)+"P";if(n>=1e12)return (n/1e12).toFixed(2)+"T";if(n>=1e9)return (n/1e9).toFixed(2)+"B";if(n>=1e6)return (n/1e6).toFixed(2)+"M";if(n>=1e3)return (n/1e3).toFixed(2)+"K";return Math.floor(n);}

function update(){
    document.getElementById("dataVal").innerText=formatNumber(data);
    document.getElementById("usdVal").innerText=usd.toFixed(2);
    document.getElementById("speedVal").innerText=(speed/1000).toFixed(2)+" Kpps";
    document.getElementById("hackersVal").innerText=hackers;
    document.getElementById("minerCost").innerText=formatNumber(minerCost);
    document.getElementById("autoCost").innerText=formatNumber(autoCost);
    document.getElementById("connCost").innerText=formatNumber(connCost);
    document.getElementById("firewallLv").innerText=firewallLevel;
    document.getElementById("firewallCost").innerText=formatNumber(firewallCost);
    document.getElementById("downCost").innerText=formatNumber(downCost);
    document.getElementById("softCost").innerText=formatNumber(softCost);
    document.getElementById("hackerCost").innerText=formatNumber(hackerCost);
    document.getElementById("botCost").innerText=formatNumber(botCost);
    updateButtons();
}

function updatePing(){
    if(!connected){document.getElementById("ping").innerText="---";document.getElementById("latency").innerText="OFFLINE";return;}
    let basePing=200-connectionLevel*1.5;if(basePing<20) basePing=20;
    let jitter=Math.random()*30;
    let finalPing=Math.floor(basePing+jitter);
    document.getElementById("ping").innerText=finalPing;
    let latencyStatus=finalPing<50?"EXCELLENT":finalPing<100?"GOOD":finalPing<150?"FAIR":"POOR";
    document.getElementById("latency").innerText=latencyStatus;
}

function saveGame(){
    let gameState = {
        data, usd, speed, minerLevel, minerCost, autoMiner, autoCost,
        connectionLevel, connCost, firewallLevel, firewallCost,
        autoReconnect, hackers, hackerCost, botSpeed, botCost,
        download, software, downCost, softCost, prestigeBonus
    };
    localStorage.setItem("dataMinerSave", JSON.stringify(gameState));
    log("consoleFarm", "SYSTEM: PROGRESS SAVED TO LOCAL STORAGE");
    showNotification("JOGO SALVO!");
}

function loadGame(){
    let savedData = localStorage.getItem("dataMinerSave");
    if(savedData){
        let state = JSON.parse(savedData);
        data = state.data; usd = state.usd; speed = state.speed;
        minerLevel = state.minerLevel; minerCost = state.minerCost;
        autoMiner = state.autoMiner; autoCost = state.autoCost;
        connectionLevel = state.connectionLevel; connCost = state.connCost;
        firewallLevel = state.firewallLevel; firewallCost = state.firewallCost;
        autoReconnect = state.autoReconnect; hackers = state.hackers;
        hackerCost = state.hackerCost; botSpeed = state.botSpeed;
        botCost = state.botCost; download = state.download;
        software = state.software; downCost = state.downCost;
        softCost = state.softCost; prestigeBonus = state.prestigeBonus;
        update();
        updateSignal();
        log("consoleFarm", "SYSTEM: PROGRESS LOADED SUCCESSFULLY");
        showNotification("JOGO CARREGADO!");
    } else {
        log("consoleFarm", "SYSTEM: NO SAVE DATA FOUND");
        showNotification("NENHUM SAVE ENCONTRADO!");
    }
}

setInterval(updatePing,1500);

loadServers();
updateSignal();
update();
updateButtons();
</script>
</body>
</html>
